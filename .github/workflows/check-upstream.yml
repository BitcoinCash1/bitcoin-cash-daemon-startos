name: Check Upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new upstream bchd release
        run: |
          set -euo pipefail
          LATEST=$(gh release view --repo gcash/bchd --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then echo "Could not fetch upstream version"; exit 0; fi

          CURRENT=$(grep -E '^ARG BCHD_VERSION=' Dockerfile.binary | cut -d= -f2)
          if [ "$LATEST" = "$CURRENT" ]; then echo "Already at $LATEST — no update"; exit 0; fi

          echo "Updating $CURRENT -> $LATEST"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i "s|^ARG BCHD_VERSION=.*|ARG BCHD_VERSION=${LATEST}|" Dockerfile.binary
          git add Dockerfile.binary
          bash scripts/auto-bump.sh "$LATEST"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
