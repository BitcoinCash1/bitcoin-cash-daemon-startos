name: Tag and Release

on:
  push:
    branches: ['master']
    paths-ignore: ['README.md']
  repository_dispatch:
    types: [upstream-release]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Setup build environment
        uses: start9labs/shared-workflows/.github/actions/setup-build-env@master

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Find or create developer signing key
        run: |
          if [ -n "${{ secrets.DEV_KEY }}" ]; then
            mkdir -p ~/.startos
            printf '%s' "${{ secrets.DEV_KEY }}" > ~/.startos/developer.key.pem
          else
            start-cli init-key
          fi
        shell: bash

      # Runs only when triggered via repository_dispatch after a new upstream BCHD release.
      - name: Auto-bump version for upstream release
        if: github.event_name == 'repository_dispatch'
        run: |
          set -euo pipefail
          DISPATCHED_TAG="${{ github.event.client_payload.tag }}"
          echo "Upstream release dispatched: $DISPATCHED_TAG"

          CURRENT_VAR=$(grep -E '^[[:space:]]*current:' startos/versions/index.ts | head -1 \
            | sed -E 's/.*current:[[:space:]]*([A-Za-z0-9_]+).*/\1/')
          VERSION_FILE_BASE=$(echo "$CURRENT_VAR" | sed -E 's/^v_//; s/_/./g')
          CURRENT_VERSION=$(grep -E "version:[[:space:]]*'" "startos/versions/v${VERSION_FILE_BASE}.ts" \
            | head -1 | sed -E "s/.*version:[[:space:]]*'([^']+)'.*/\1/")
          CURRENT_UPSTREAM="${CURRENT_VERSION%%:*}"

          # Strip leading 'v' from tag for comparison (gcash/bchd tags as v0.22.0)
          CLEAN_TAG="${DISPATCHED_TAG#v}"

          if [ "$CURRENT_UPSTREAM" = "$CLEAN_TAG" ]; then
            echo "Already at $CLEAN_TAG — no bump needed"
            exit 0
          fi
          echo "Bumping $CURRENT_UPSTREAM -> $CLEAN_TAG"

          TAG_VAR="v_$(echo "$CLEAN_TAG" | tr '.' '_')_0"
          NEW_VERSION="${CLEAN_TAG}:0"
          NEW_FILE="startos/versions/v${CLEAN_TAG}.0.ts"

          echo "import { VersionInfo } from '@start9labs/start-sdk'" > "$NEW_FILE"
          echo "" >> "$NEW_FILE"
          echo "export const ${TAG_VAR} = VersionInfo.of({" >> "$NEW_FILE"
          echo "  version: '${NEW_VERSION}'," >> "$NEW_FILE"
          echo "  releaseNotes: 'Upstream ${DISPATCHED_TAG}.'," >> "$NEW_FILE"
          echo "  migrations: {" >> "$NEW_FILE"
          echo "    up: async ({ effects }) => {}," >> "$NEW_FILE"
          echo "    down: async ({ effects }) => {}," >> "$NEW_FILE"
          echo "  }," >> "$NEW_FILE"
          echo "})" >> "$NEW_FILE"

          # Update Dockerfile BCHD_VERSION build arg
          sed -i "s|ARG BCHD_VERSION=v[0-9][0-9.]*|ARG BCHD_VERSION=${DISPATCHED_TAG}|" Dockerfile

          # Update versions/index.ts
          sed -i "1a import { ${TAG_VAR} } from './${CLEAN_TAG}.0'" startos/versions/index.ts
          sed -i "s/current: ${CURRENT_VAR}/current: ${TAG_VAR}/" startos/versions/index.ts
          sed -i "s/other: \[/other: [${CURRENT_VAR}, /" startos/versions/index.ts

          git add startos/versions/index.ts "$NEW_FILE" Dockerfile
          git commit -m "feat: auto-bump to upstream ${DISPATCHED_TAG} (v${NEW_VERSION})"
          git push origin master
          echo "Version bump committed — continuing build"
        shell: bash

      - name: Build service packages
        run: |
          RUST_LOG=debug RUST_BACKTRACE=1 make
          echo ""
          echo "SHA256SUMs:"
          sha256sum *.s9pk
        shell: bash

      - name: Generate changelog
        id: meta
        run: |
          FIRST_S9PK=$(ls *.s9pk | head -1)
          TITLE=$(start-cli s9pk inspect "$FIRST_S9PK" manifest | jq -r '.title')
          VERSION=$(start-cli s9pk inspect "$FIRST_S9PK" manifest | jq -r '.version')
          VERSION_TAG="v${VERSION/:/.}"
          RELEASE_NOTES=$(start-cli s9pk inspect "$FIRST_S9PK" manifest | jq -r '.releaseNotes // "No release notes provided."')
          {
            echo "## What's Changed"
            echo ""
            echo "Version: ${VERSION} (${VERSION_TAG})"
            echo ""
            echo "${RELEASE_NOTES}"
            echo ""
            echo "## SHA256 Hashes"
            echo '```'
            sha256sum *.s9pk
            echo '```'
          } > change-log.txt
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vtag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Move release tags to current commit
        run: |
          git tag -f "${{ steps.meta.outputs.vtag }}"
          git push origin -f "${{ steps.meta.outputs.vtag }}"

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.vtag }}
          name: ${{ steps.meta.outputs.title }} ${{ steps.meta.outputs.version }}
          prerelease: false
          body_path: change-log.txt
          files: ./*.s9pk
