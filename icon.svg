<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>
  <!-- BCH green accent ring -->
  <circle cx="100" cy="88" r="52" fill="none" stroke="#24e6aa" stroke-width="4" opacity="0.3"/>
  <circle cx="100" cy="88" r="40" fill="none" stroke="#24e6aa" stroke-width="2.5"/>
  <!-- Stylized "D" in center -->
  <text x="100" y="102" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="52" fill="#24e6aa">D</text>
  <!-- BCHD text -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="28" fill="#ffffff">BCHD</text>
  <!-- Small BCH symbol -->
  <text x="100" y="178" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#24e6aa" opacity="0.7">Bitcoin Cash</text>
</svg>
